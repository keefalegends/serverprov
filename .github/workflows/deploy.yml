name: Techno Serverless CI/CD Pipeline

on:
  push:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: Skip test jobs
        required: false
        default: 'false'
        type: boolean

env:
  AWS_REGION: us-east-1
  APP_NAME: techno-codedeploy-app
  DEPLOYMENT_GROUP: techno-codedeploy-group

jobs:

  # ─── JOB 1: Track fork ───────────────────────────────────────
  track-and-notify-owner:
    name: Track Repository
    runs-on: ubuntu-latest
    outputs:
      is_fork: ${{ steps.check_fork.outputs.is_fork }}
    steps:
      - uses: actions/checkout@v4

      - name: Check fork
        id: check_fork
        run: |
          IS_FORK="${{ github.event.repository.fork }}"
          echo "is_fork=$IS_FORK" >> $GITHUB_OUTPUT
          echo "Repo: ${{ github.repository }} | Fork: $IS_FORK | Actor: ${{ github.actor }}"

      - name: Configure AWS credentials
        if: steps.check_fork.outputs.is_fork == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Notify fork via SNS
        if: steps.check_fork.outputs.is_fork == 'true'
        run: |
          aws sns publish \
            --topic-arn "${{ secrets.SNS_TOPIC_ARN }}" \
            --subject "Fork Detected: ${{ github.repository }}" \
            --message "Fork by ${{ github.actor }} on ${{ github.repository }} commit ${{ github.sha }}" \
            --region ${{ env.AWS_REGION }}

      - name: Log pipeline start
        run: |
          echo "Pipeline started by ${{ github.actor }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"

  # ─── JOB 2: Test ─────────────────────────────────────────────
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    needs: track-and-notify-owner
    if: github.event.inputs.skip_tests != 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install flake8 pyyaml

      - name: Validate Python syntax
        run: |
          for f in lambda/*/lambda_function.py; do
            python -m py_compile "$f" && echo "OK: $f"
          done

      - name: Run flake8
        run: |
          flake8 lambda/ --count --select=E9,F63,F7,F82 --show-source --statistics
          echo "Linting passed"

      - name: Validate Step Functions ASL
        run: |
          python -c "
          import json
          with open('step_functions/order-workflow.json') as f:
              d = json.load(f)
          assert 'StartAt' in d and 'States' in d
          print('ASL JSON valid, states:', list(d['States'].keys()))
          "

      - name: Validate AppSpec
        run: |
          test -f codedeploy/appspec.yml || (echo "appspec.yml not found" && exit 1)
          grep -q "Resources" codedeploy/appspec.yml || (echo "Resources missing" && exit 1)
          grep -q "Alias" codedeploy/appspec.yml || (echo "Alias missing" && exit 1)
          echo "AppSpec valid"

      - name: Validate Frontend HTML
        run: |
          python -c "
          from html.parser import HTMLParser
          with open('frontend/index.html') as f:
              src = f.read()
          HTMLParser().feed(src)
          print('HTML valid, size:', len(src), 'bytes')
          "

  # ─── JOB 3: Deploy 6 Lambda (update alias langsung) ─────────
  # Ke-6 fungsi ini di-deploy via update-function-code + update alias
  # tanpa CodeDeploy agar tidak konflik deployment group
  deploy-lambda:
    name: Deploy Lambda ${{ matrix.function.name }}
    runs-on: ubuntu-latest
    needs: [track-and-notify-owner, test]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    strategy:
      max-parallel: 3
      fail-fast: false
      matrix:
        function:
          - { name: process-payment,   dir: process_payment   }
          - { name: update-inventory,  dir: update_inventory  }
          - { name: send-notification, dir: send_notification }
          - { name: generate-report,   dir: generate_report   }
          - { name: init-db,           dir: init_db           }
          - { name: health-check,      dir: health_check      }
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package Lambda zip
        run: |
          FUNC_NAME="techno-lambda-${{ matrix.function.name }}"
          echo "FUNC_NAME=$FUNC_NAME" >> $GITHUB_ENV
          cd lambda/${{ matrix.function.dir }}
          zip -q /tmp/${FUNC_NAME}.zip lambda_function.py

      - name: Upload zip to S3
        run: |
          aws s3 cp /tmp/${FUNC_NAME}.zip \
            "s3://${{ secrets.S3_DEPLOYMENT_BUCKET }}/lambda/${FUNC_NAME}/${{ github.sha }}.zip" \
            --region ${{ env.AWS_REGION }}

      - name: Update Lambda code
        run: |
          aws lambda update-function-code \
            --function-name "$FUNC_NAME" \
            --zip-file "fileb:///tmp/${FUNC_NAME}.zip" \
            --region ${{ env.AWS_REGION }} \
            --no-cli-pager
          aws lambda wait function-updated \
            --function-name "$FUNC_NAME" \
            --region ${{ env.AWS_REGION }}

      - name: Ensure psycopg2 layer is attached
        run: |
          # Ambil ARN layer techno-layer-dependencies yang sudah ada
          LAYER_ARN=$(aws lambda list-layers \
            --region ${{ env.AWS_REGION }} \
            --query 'Layers[?contains(LayerName,`techno-layer`)].LatestMatchingVersion.LayerVersionArn' \
            --output text --no-cli-pager)
          if [ -z "$LAYER_ARN" ] || [ "$LAYER_ARN" = "None" ]; then
            echo "Layer not found - skipping"
            exit 0
          fi
          echo "Layer ARN: $LAYER_ARN"
          # Cek apakah layer sudah ter-attach
          CURRENT_LAYERS=$(aws lambda get-function-configuration \
            --function-name "$FUNC_NAME" \
            --region ${{ env.AWS_REGION }} \
            --query 'Layers[].Arn' \
            --output text --no-cli-pager)
          if echo "$CURRENT_LAYERS" | grep -q "$LAYER_ARN"; then
            echo "Layer already attached - OK"
          else
            echo "Re-attaching layer to $FUNC_NAME..."
            aws lambda update-function-configuration \
              --function-name "$FUNC_NAME" \
              --layers "$LAYER_ARN" \
              --region ${{ env.AWS_REGION }} \
              --no-cli-pager
            aws lambda wait function-updated \
              --function-name "$FUNC_NAME" \
              --region ${{ env.AWS_REGION }}
            echo "Layer re-attached OK"
          fi

      - name: Publish version and update alias
        run: |
          VERSION=$(aws lambda publish-version \
            --function-name "$FUNC_NAME" \
            --description "sha=${{ github.sha }}" \
            --region ${{ env.AWS_REGION }} \
            --query 'Version' --output text --no-cli-pager)
          echo "Published version: $VERSION"
          # Cek apakah alias 'live' ada sebelum update (init-db tidak punya alias)
          ALIAS_EXISTS=$(aws lambda get-alias \
            --function-name "$FUNC_NAME" \
            --name live \
            --region ${{ env.AWS_REGION }} \
            --query 'Name' --output text --no-cli-pager 2>/dev/null || echo "NOT_FOUND")
          if [ "$ALIAS_EXISTS" = "live" ]; then
            aws lambda update-alias \
              --function-name "$FUNC_NAME" \
              --name live \
              --function-version "$VERSION" \
              --region ${{ env.AWS_REGION }} \
              --no-cli-pager
            echo "Alias 'live' updated to v$VERSION for $FUNC_NAME"
          else
            echo "No alias 'live' for $FUNC_NAME - skipping alias update (code updated)"
          fi

  # ─── JOB 4: Deploy order-management via CodeDeploy (Blue/Green)
  # Hanya fungsi utama ini yang pakai CodeDeploy Canary
  # untuk demonstrasi Blue/Green deployment
  deploy-bluegreen:
    name: Deploy order-management (Blue/Green CodeDeploy)
    runs-on: ubuntu-latest
    needs: [track-and-notify-owner, test]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package Lambda zip
        run: |
          cd lambda/order_management
          zip -q /tmp/techno-lambda-order-management.zip lambda_function.py
          echo "Packaged order-management"

      - name: Upload zip to S3
        run: |
          aws s3 cp /tmp/techno-lambda-order-management.zip \
            "s3://${{ secrets.S3_DEPLOYMENT_BUCKET }}/lambda/techno-lambda-order-management/${{ github.sha }}.zip" \
            --region ${{ env.AWS_REGION }}

      - name: Update Lambda code
        run: |
          aws lambda update-function-code \
            --function-name techno-lambda-order-management \
            --zip-file "fileb:///tmp/techno-lambda-order-management.zip" \
            --region ${{ env.AWS_REGION }} \
            --no-cli-pager
          aws lambda wait function-updated \
            --function-name techno-lambda-order-management \
            --region ${{ env.AWS_REGION }}

      - name: Ensure psycopg2 layer is attached
        run: |
          LAYER_ARN=$(aws lambda list-layers \
            --region ${{ env.AWS_REGION }} \
            --query 'Layers[?contains(LayerName,`techno-layer`)].LatestMatchingVersion.LayerVersionArn' \
            --output text --no-cli-pager)
          if [ -z "$LAYER_ARN" ] || [ "$LAYER_ARN" = "None" ]; then
            echo "Layer not found - skipping"
            exit 0
          fi
          CURRENT_LAYERS=$(aws lambda get-function-configuration \
            --function-name techno-lambda-order-management \
            --region ${{ env.AWS_REGION }} \
            --query 'Layers[].Arn' \
            --output text --no-cli-pager)
          if echo "$CURRENT_LAYERS" | grep -q "$LAYER_ARN"; then
            echo "Layer already attached - OK"
          else
            echo "Re-attaching layer..."
            aws lambda update-function-configuration \
              --function-name techno-lambda-order-management \
              --layers "$LAYER_ARN" \
              --region ${{ env.AWS_REGION }} \
              --no-cli-pager
            aws lambda wait function-updated \
              --function-name techno-lambda-order-management \
              --region ${{ env.AWS_REGION }}
            echo "Layer re-attached OK"
          fi

      - name: Publish Lambda version
        id: publish
        run: |
          VERSION=$(aws lambda publish-version \
            --function-name techno-lambda-order-management \
            --description "sha=${{ github.sha }}" \
            --region ${{ env.AWS_REGION }} \
            --query 'Version' --output text --no-cli-pager)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Published version: $VERSION"

      - name: Get current alias version (Blue)
        id: blue
        run: |
          CURRENT=$(aws lambda get-alias \
            --function-name techno-lambda-order-management \
            --name live \
            --region ${{ env.AWS_REGION }} \
            --query 'FunctionVersion' --output text --no-cli-pager 2>/dev/null || echo "1")
          echo "CURRENT=$CURRENT" >> $GITHUB_OUTPUT
          echo "Blue=$CURRENT Green=${{ steps.publish.outputs.VERSION }}"

      - name: Upload AppSpec to S3
        id: appspec
        run: |
          S3_KEY="codedeploy/order-management/${{ github.sha }}.json"
          cat > /tmp/appspec.json << APPSPEC
          {
            "version": 0.0,
            "Resources": [{
              "techno-lambda-order-management": {
                "Type": "AWS::Lambda::Function",
                "Properties": {
                  "Name": "techno-lambda-order-management",
                  "Alias": "live",
                  "CurrentVersion": "${{ steps.blue.outputs.CURRENT }}",
                  "TargetVersion": "${{ steps.publish.outputs.VERSION }}"
                }
              }
            }]
          }
          APPSPEC
          aws s3 cp /tmp/appspec.json \
            "s3://${{ secrets.S3_DEPLOYMENT_BUCKET }}/${S3_KEY}" \
            --region ${{ env.AWS_REGION }}
          echo "S3_KEY=$S3_KEY" >> $GITHUB_OUTPUT

      - name: Create CodeDeploy deployment (Canary Blue/Green)
        id: codedeploy
        run: |
          # Stop active deployment jika ada, agar tidak DeploymentLimitExceededException
          ACTIVE=$(aws deploy list-deployments \
            --application-name "$APP_NAME" \
            --deployment-group-name "$DEPLOYMENT_GROUP" \
            --include-only-statuses InProgress Created Ready \
            --region ${{ env.AWS_REGION }} \
            --query 'deployments[0]' --output text --no-cli-pager 2>/dev/null || echo "None")
          if [ "$ACTIVE" != "None" ] && [ -n "$ACTIVE" ]; then
            echo "Stopping active deployment: $ACTIVE"
            aws deploy stop-deployment \
              --deployment-id "$ACTIVE" \
              --auto-rollback-enabled \
              --region ${{ env.AWS_REGION }} \
              --no-cli-pager || true
            sleep 5
          fi
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name "$APP_NAME" \
            --deployment-group-name "$DEPLOYMENT_GROUP" \
            --deployment-config-name "CodeDeployDefault.LambdaCanary10Percent5Minutes" \
            --revision "revisionType=S3,s3Location={bucket=${{ secrets.S3_DEPLOYMENT_BUCKET }},key=${{ steps.appspec.outputs.S3_KEY }},bundleType=JSON}" \
            --description "Blue/Green order-management v${{ steps.publish.outputs.VERSION }}" \
            --region ${{ env.AWS_REGION }} \
            --query 'deploymentId' --output text --no-cli-pager)
          echo "DEPLOYMENT_ID=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT
          echo "CodeDeploy Deployment: $DEPLOYMENT_ID"

      - name: Wait for CodeDeploy deployment
        run: |
          echo "Canary 10% traffic for 5 minutes..."
          aws deploy wait deployment-successful \
            --deployment-id "${{ steps.codedeploy.outputs.DEPLOYMENT_ID }}" \
            --region ${{ env.AWS_REGION }}
          echo "Blue/Green deployment successful!"

  # ─── JOB 5: Deploy Frontend ──────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend via Amplify
    runs-on: ubuntu-latest
    needs: [deploy-lambda, deploy-bluegreen]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate frontend files
        run: |
          test -f frontend/index.html && echo "index.html OK"
          test -f amplify.yml && echo "amplify.yml OK"

      - name: Reset Amplify build spec to use amplify.yml from repo
        run: |
          # Paksa Amplify baca build settings dari amplify.yml di repo, bukan dari console
          aws amplify update-app \
            --app-id "${{ secrets.AMPLIFY_APP_ID }}" \
            --region ${{ env.AWS_REGION }} \
            --no-cli-pager \
            --build-spec "version: 1\nfrontend:\n  phases:\n    preBuild:\n      commands:\n        - ls -la\n        - test -f frontend/index.html && echo OK || exit 1\n    build:\n      commands:\n        - echo done\n  artifacts:\n    baseDirectory: frontend\n    files:\n      - '**/*'" || true
          echo "Build spec reset done"

      - name: Trigger Amplify build
        id: amplify
        run: |
          # Stop any pending/running jobs on this branch first
          RUNNING=$(aws amplify list-jobs \
            --app-id "${{ secrets.AMPLIFY_APP_ID }}" \
            --branch-name ${{ github.ref_name }} \
            --region ${{ env.AWS_REGION }} \
            --query 'jobSummaries[?status==`RUNNING` || status==`PENDING`].jobId' \
            --output text --no-cli-pager 2>/dev/null || echo "")
          for JID in $RUNNING; do
            echo "Stopping existing job: $JID"
            aws amplify stop-job \
              --app-id "${{ secrets.AMPLIFY_APP_ID }}" \
              --branch-name ${{ github.ref_name }} \
              --job-id "$JID" \
              --region ${{ env.AWS_REGION }} \
              --no-cli-pager || true
          done
          [ -n "$RUNNING" ] && sleep 5
          JOB_ID=$(aws amplify start-job \
            --app-id "${{ secrets.AMPLIFY_APP_ID }}" \
            --branch-name ${{ github.ref_name }} \
            --job-type RELEASE \
            --commit-id "${{ github.sha }}" \
            --commit-message "deploy ${{ github.sha }}" \
            --region ${{ env.AWS_REGION }} \
            --query 'jobSummary.jobId' --output text --no-cli-pager)
          echo "JOB_ID=$JOB_ID" >> $GITHUB_OUTPUT
          echo "Amplify Job: $JOB_ID"

      - name: Wait for Amplify build
        run: |
          APP_ID="${{ secrets.AMPLIFY_APP_ID }}"
          BRANCH="${{ github.ref_name }}"
          JOB_ID="${{ steps.amplify.outputs.JOB_ID }}"
          for i in $(seq 1 40); do
            STATUS=$(aws amplify get-job \
              --app-id "$APP_ID" \
              --branch-name "$BRANCH" \
              --job-id "$JOB_ID" \
              --region ${{ env.AWS_REGION }} \
              --query 'job.summary.status' --output text --no-cli-pager)
            echo "Attempt $i/40 - Status: $STATUS"
            if [ "$STATUS" = "SUCCEED" ]; then
              echo "Amplify build succeeded!"
              AMPLIFY_URL=$(aws amplify get-branch \
                --app-id "$APP_ID" --branch-name "$BRANCH" \
                --region ${{ env.AWS_REGION }} \
                --query 'branch.displayName' --output text --no-cli-pager 2>/dev/null || echo "")
              echo "Frontend URL: https://${BRANCH}.$(aws amplify get-app --app-id $APP_ID --region ${{ env.AWS_REGION }} --query 'app.defaultDomain' --output text --no-cli-pager 2>/dev/null || echo 'check-amplify-console')"
              exit 0
            fi
            if [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "Amplify build $STATUS - fetching step details..."
              aws amplify get-job \
                --app-id "$APP_ID" \
                --branch-name "$BRANCH" \
                --job-id "$JOB_ID" \
                --region ${{ env.AWS_REGION }} \
                --query 'job.steps[?status==`FAILED`].[stepName,statusReason]' \
                --output table --no-cli-pager 2>/dev/null || true
              echo "Check full logs: AWS Console > Amplify > $APP_ID > $BRANCH > Job $JOB_ID"
              exit 1
            fi
            sleep 30
          done
          echo "Timeout - check Amplify console"
          exit 1

  # ─── JOB 6: Notify ───────────────────────────────────────────
  notify:
    name: Send Deployment Notification
    runs-on: ubuntu-latest
    needs: [deploy-lambda, deploy-bluegreen, deploy-frontend]
    if: always() && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Send SNS notification
        run: |
          LAMBDA_RESULT="${{ needs.deploy-lambda.result }}"
          BG_RESULT="${{ needs.deploy-bluegreen.result }}"
          FRONTEND_RESULT="${{ needs.deploy-frontend.result }}"
          if [ "$LAMBDA_RESULT" = "success" ] && [ "$BG_RESULT" = "success" ] && [ "$FRONTEND_RESULT" = "success" ]; then
            STATUS="SUCCESS"
          else
            STATUS="FAILED"
          fi
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          aws sns publish \
            --topic-arn "${{ secrets.SNS_TOPIC_ARN }}" \
            --subject "Deploy ${STATUS} - techno-serverless" \
            --message "Status=${STATUS} Commit=${{ github.sha }} Actor=${{ github.actor }} Branch=${{ github.ref_name }} Time=${TIMESTAMP} Lambda(6fn)=${LAMBDA_RESULT} BlueGreen(order-mgmt)=${BG_RESULT} Frontend=${FRONTEND_RESULT} Run=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --region ${{ env.AWS_REGION }} \
            --no-cli-pager
          echo "Notification sent - $STATUS"
