version: 1
frontend:
  phases:
    preBuild:
      commands:
        - "echo '========== DEBUG INFO =========='"
        - "echo 'Current directory: $(pwd)'"
        - "echo 'Directory structure:'"
        - "ls -la"
        - "echo '================================='"
        - "echo 'Checking frontend directory:'"
        - "if [ -d 'frontend' ]; then echo 'frontend exists'; ls -la frontend/; else echo 'frontend NOT FOUND'; fi"
        - "echo '================================='"
        - "test -f frontend/index.html && echo '✓ index.html found' || (echo '✗ index.html NOT FOUND' && exit 1)"
    build:
      commands:
        - "echo 'No build step required - static HTML'"
    postBuild:
      commands:
        - "echo 'Build done'"
        - "ls -la frontend/"
  artifacts:
    baseDirectory: frontend
    files:
      - "**/*"
  cache:
    paths: []